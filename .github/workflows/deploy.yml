name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'mw-export/**'
      - 'wp-export/**'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"
          extended: true

      - run: hugo --minify

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=uo-wzk-cz --branch=${{ github.ref_name }}
