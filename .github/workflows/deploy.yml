name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'mw-export/**'
      - 'wp-export/**'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:

          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.158.0/hugo_extended_0.158.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.158.0_linux-amd64.deb

      - run: hugo --minify

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=uo-wzk-cz --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
